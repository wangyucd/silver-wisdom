server:
  port: 9102

spring:
  application:
    name: silver-content
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:silver_wisdom}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      server-addr: ${NACOS_ADDR:127.0.0.1:8848}
      discovery:
        enabled: ${NACOS_ENABLED:true}
      config:
        enabled: false
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:1}
  ai:
    dashscope:
      api-key: ${ALIBABA_AI_API_KEY:your-api-key}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
          top-p: 0.9
    openai:
      base-url: ${OPENAI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      api-key: ${OPENAI_API_KEY:sk-xrtVJiO8PSAV00qiPrVsWbpzfnVrzVcfzInybdPQ4hh72n1G}
      chat:
        options:
          model: ${OPENAI_MODEL:ep-20250330091925-2wtps}
          temperature: 0.7

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  is-concurrent: true
  is-share: false
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET:silver-wisdom-jwt-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
